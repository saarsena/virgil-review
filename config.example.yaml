# Virgil — example configuration.
#
# Copy this file to config.yaml and fill in the GitHub App credentials.
# config.yaml is gitignored; never commit real values.

server:
  # TCP port the webhook server listens on. /webhook + /healthz.
  port: 8081

github:
  # The numeric App ID shown in your GitHub App settings page.
  app_id: 123456

  # Path to the PEM-encoded private key downloaded when the App was
  # created. Keep this file out of the repo (the .gitignore already
  # excludes *.pem).
  private_key_path: ./virgil-review.private-key.pem

  # The webhook secret configured in the App settings — must match
  # exactly, or signature verification will reject every delivery.
  webhook_secret: replace-me-with-the-real-secret

anthropic:
  # Anthropic API key. If empty, the server falls back to the
  # ANTHROPIC_API_KEY environment variable.
  api_key: ""

  # Model to use for reviews. Defaults to claude-sonnet-4-6 if unset.
  model: claude-sonnet-4-6

  # Maximum output tokens per review. Defaults to 16384 if unset.
  max_tokens: 16384

reviewer:
  # One of: lenient | balanced | strict. Defaults to balanced.
  strictness: balanced

storage:
  # SQLite database path. Defaults to ~/.local/share/virgil/state.db
  # if empty. Parent directory is created on startup.
  path: ""
